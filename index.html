
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aqua Clicker</title>
    <style>
        body {
            margin: 0; padding: 0; background: linear-gradient(180deg, #1a2a6c, #275d8c);
            color: white; font-family: sans-serif; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }
        .header { font-size: 28px; font-weight: bold; margin-bottom: 10px; }
        .score { font-size: 42px; font-weight: 800; color: #00ffff; margin-bottom: 30px; text-shadow: 0 0 10px rgba(0,255,255,0.5); }
        .click-area { position: relative; width: 200px; height: 200px; }
        .drop {
            width: 100%; height: 100%; background: radial-gradient(circle at 35% 35%, #66ffff, #0088cc 60%, #005588);
            border-radius: 0% 100% 100% 100%; transform: rotate(-45deg);
            box-shadow: -10px 10px 25px rgba(0,0,0,0.4), inset -5px 5px 15px rgba(255,255,255,0.6);
            cursor: pointer; transition: transform 0.05s ease;
        }
        .drop:active { transform: rotate(-45deg) scale(0.9); }
        .splash {
            position: absolute; width: 8px; height: 8px; background: #00e5ff; border-radius: 50%;
            pointer-events: none; animation: fly 0.4s ease-out forwards;
        }
        @keyframes fly {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="header">AQUA BALANCE</div>
    <div class="score" id="score">0</div>
    <div class="click-area"><div class="drop" id="dropBtn"></div></div>
    <script>
        let score = 0;
        const scoreEl = document.getElementById('score');
        const btn = document.getElementById('dropBtn');
        
        btn.addEventListener('click', (e) => {
            score++; 
            scoreEl.innerText = score;
            
            // Ефект бризок
            for (let i = 0; i < 6; i++) { createSplash(e.clientX, e.clientY); }
        });
        
        function createSplash(x, y) {
            const s = document.createElement('div'); s.classList.add('splash');
            const r = btn.getBoundingClientRect();
            s.style.left = `calc(50% + ${x - r.left - 100}px)`; s.style.top = `calc(50% + ${y - r.top - 100}px)`;
            const a = Math.random() * Math.PI * 2; const d = 50 + Math.random() * 60;
            s.style.setProperty('--x', `${Math.cos(a) * d}px`); s.style.setProperty('--y', `${Math.sin(a) * d}px`);
            btn.parentElement.appendChild(s); setTimeout(() => s.remove(), 400);
        }
    </script>
</body>
</html>
